site_name: Training Gym SDK
site_description: Autogenerated docs for the Modal Training Gym SDK and tutorials.
site_url: https://training-gym.modal.dev/
repo_name: modal-training-gym
repo_url: https://github.com/modal-projects/training-gym

docs_dir: pages
site_dir: ../site

nav:
  - Training Gym SDK: index.md
  - Tutorials: tutorials/index.md
  - Support: support.md

theme:
  name: material
  language: en
  icon:
    repo: fontawesome/brands/github
  features:
    - navigation.instant
    - navigation.tabs
    - navigation.top
    - navigation.tracking
    - search.highlight
    - search.suggest
    - content.code.copy
    - toc.follow
  palette:
    - scheme: default
      media: "(prefers-color-scheme: light)"
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      media: "(prefers-color-scheme: dark)"
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

plugins:
  - search
  - gen-files:
      scripts:
        - ../scripts/generate_docs_pages.py

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.inlinehilite
  - pymdownx.superfences

extra_css:
  - stylesheets/extra.css
