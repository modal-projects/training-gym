site_name: Training Gym SDK
site_description: Autogenerated docs for the Modal Training Gym SDK and tutorials.
site_url: https://training-gym.modal.dev/
repo_name: modal-training-gym
repo_url: https://github.com/modal-projects/training-gym

docs_dir: pages
site_dir: ../site

nav:
  - Training Gym SDK: index.md
  - Tutorials: tutorials/index.md
  - Support: support.md

theme:
  name: material
  language: en
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.instant
    - navigation.top
    - toc.follow
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.action.view
  font:
    text: Inter
    code: JetBrains Mono
  palette:
    - scheme: slate
      primary: black
      accent: green
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
    - scheme: default
      primary: white
      accent: green
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
  icon:
    repo: fontawesome/brands/github

plugins:
  - search
  - gen-files:
      scripts:
        - generate_mkdocs_pages.py

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.inlinehilite
  - pymdownx.superfences

extra_css:
  - stylesheets/modal-green-v2.css
