name: Docs

on:
  pull_request:
    paths:
      - ".github/workflows/docs.yml"
      - "README.md"
      - "docs-next/**"
      - "modal_training_gym/**"
      - "pyproject.toml"
      - "scripts/generate_all.py"
      - "scripts/generate_docs_pages.py"
      - "scripts/generate_api_reference.py"
      - "scripts/generate_tutorial_pages.py"
      - "scripts/api_reference_manifest.py"
      - "tutorials/tutorial_generator/**"
      - "tutorials/README.md"
      - "uv.lock"
  push:
    paths:
      - ".github/workflows/docs.yml"
      - "README.md"
      - "docs-next/**"
      - "modal_training_gym/**"
      - "pyproject.toml"
      - "scripts/generate_all.py"
      - "scripts/generate_docs_pages.py"
      - "scripts/generate_api_reference.py"
      - "scripts/generate_tutorial_pages.py"
      - "scripts/api_reference_manifest.py"
      - "tutorials/tutorial_generator/**"
      - "tutorials/README.md"
      - "uv.lock"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: docs
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      UV_CACHE_DIR: /tmp/uv-cache
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version-file: ".python-version"

      - uses: astral-sh/setup-uv@v5

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Sync Python dependencies
        run: uv sync --group docs

      - name: Generate and build docs
        run: uv run python scripts/generate_all.py

      - name: Validate docs_next_app.py
        run: uv run python -m py_compile docs-next/docs_next_app.py

  deploy:
    if: github.event_name == 'push' && github.ref_name == github.event.repository.default_branch && secrets.MODAL_TOKEN_ID != '' && secrets.MODAL_TOKEN_SECRET != ''
    needs:
      - build
    runs-on: ubuntu-latest
    env:
      MODAL_TOKEN_ID: ${{ secrets.MODAL_TOKEN_ID }}
      MODAL_TOKEN_SECRET: ${{ secrets.MODAL_TOKEN_SECRET }}
      UV_CACHE_DIR: /tmp/uv-cache
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version-file: ".python-version"

      - uses: astral-sh/setup-uv@v5

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Sync dependencies
        run: uv sync --group docs

      - name: Generate and build docs
        run: uv run python scripts/generate_all.py

      - name: Deploy docs to Modal
        run: uv run modal deploy docs-next/docs_next_app.py
